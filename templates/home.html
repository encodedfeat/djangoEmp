{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{%static 'css/home.css'%}">
</head>
<body class="bg-light">

    <div class="container mt-5">
        
        <div class="row mb-3">
            <div class="col">
                <h2 class="text-primary">Employee Directory</h2>
                <p class="text-muted">A list of current employees and their descriptions.</p>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover table-bordered mb-0">
                       
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" class="text-center" style="width: 10%;">Count No.</th>
                                <th scope="col" style="width: 30%;">Name</th>
                                <th scope="col" style="width: 60%;">Description</th>
                            </tr>
                        </thead>
                        
                        <tbody>  
                            {%for emp in employee%}
                            <tr>
                                
                                <td class="text-center fw-bold">{{forloop.counter}}</td>
                                <td><a href="{%url 'Emp_details' emp.id%}">{{emp.first_name}} {{emp.last_name}}</a></td>
                                <td>{{emp.description}}</td>
                                
                            </tr> 
                            {%endfor%}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
